name: Pully reminder

on:
  schedule:
    - cron: '* * * * *'  # Every minute

jobs:
  remind:
    runs-on: ubuntu-latest
    name: Post reminder on PRs awaiting review
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: N35N0M/pully@c4267049dc7f2f637970231fce7552796d8ce886
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULLY_SLACK_CHANNEL: ${{ secrets.PULLY_SLACK_CHANNEL }}
          PULLY_SLACK_TOKEN: ${{ secrets.PULLY_SLACK_TOKEN }}
