name: Build and test pully source

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version-file: .dvmrc
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Check format
        run: deno fmt --check
      - name: Build code with tsc for typechecks
        run: deno task build
      - name: Package code with rollup for fast CI execution times
        run: deno task package
      - name: Run tests
        run: deno test
      - name: Check that the prebuilt dist is up-to-date with the src
        run: git diff --exit-code
