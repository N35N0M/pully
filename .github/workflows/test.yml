name: Build and test pully source

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.1
          cache: true
      - name: Install dependencies
        run: deno install --frozen
      - name: Build code with tsc for typechecks
        run: deno task build
      - name: Package code with rollup for fast CI execution times
        run: deno task package package
      - name: Run tests
        run: deno test